<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120" role="img" aria-labelledby="title desc">
  <title id="title">Animated DevOps deployment control loop</title>
  <desc id="desc">A moving neon deployment pipeline connecting code, build, test, deploy, observe, and improve stages.</desc>
  <defs>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset=".5" stop-color="#7c4dff"/>
      <stop offset="1" stop-color="#00c853"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono { font-family:"JetBrains Mono","Fira Code",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .rail { stroke:url(#rail); stroke-width:2.5; stroke-dasharray:8 12; animation:move 2s linear infinite; }
      .node { fill:#0b1627; stroke:#2b4567; stroke-width:1.5; }
      .label { fill:#a9c0da; font-size:13px; font-weight:700; letter-spacing:.8px; }
      .pulse { animation:pulse 1.8s ease-in-out infinite; transform-origin:center; }
      @keyframes move { to { stroke-dashoffset:-40; } }
      @keyframes pulse { 0%,100% { opacity:.45; } 50% { opacity:1; } }
    </style>
  </defs>

  <rect x="2" y="16" width="1196" height="88" rx="20" fill="#07111f" stroke="#172d48"/>
  <text x="36" y="45" class="mono" fill="#6e88a8" font-size="11">DEPLOYMENT CONTROL LOOP</text>
  <line x1="76" y1="72" x2="1124" y2="72" class="rail"/>

  <g>
    <rect x="76" y="54" width="104" height="36" rx="10" class="node"/>
    <text x="128" y="77" text-anchor="middle" class="mono label">CODE</text>
  </g>
  <g>
    <rect x="264" y="54" width="104" height="36" rx="10" class="node"/>
    <text x="316" y="77" text-anchor="middle" class="mono label">BUILD</text>
  </g>
  <g>
    <rect x="452" y="54" width="104" height="36" rx="10" class="node"/>
    <text x="504" y="77" text-anchor="middle" class="mono label">TEST</text>
  </g>
  <g>
    <rect x="640" y="54" width="104" height="36" rx="10" class="node"/>
    <text x="692" y="77" text-anchor="middle" class="mono label">DEPLOY</text>
  </g>
  <g>
    <rect x="828" y="54" width="104" height="36" rx="10" class="node"/>
    <text x="880" y="77" text-anchor="middle" class="mono label">OBSERVE</text>
  </g>
  <g>
    <rect x="1016" y="54" width="108" height="36" rx="10" class="node"/>
    <text x="1070" y="77" text-anchor="middle" class="mono label">IMPROVE</text>
  </g>

  <circle r="6" fill="#ffffff" filter="url(#glow)">
    <animateMotion dur="5.8s" repeatCount="indefinite" path="M180 72 H264 M368 72 H452 M556 72 H640 M744 72 H828 M932 72 H1016"/>
  </circle>
  <circle cx="1148" cy="72" r="7" fill="#00e676" class="pulse" filter="url(#glow)"/>
</svg>
