<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Parsa Khezli DevOps Control Plane</title>
  <desc id="desc">Animated DevOps dashboard showing a deployment pipeline, infrastructure nodes, and live system metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.52" stop-color="#10162d"/>
      <stop offset="1" stop-color="#071a20"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.55" stop-color="#7c4dff"/>
      <stop offset="1" stop-color="#00c853"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1f3554" stroke-width="1" opacity=".28"/>
    </pattern>
    <style>
      .mono { font-family: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .label { fill:#8ea6c4; font-size:14px; letter-spacing:1.2px; }
      .stage { fill:#dcecff; font-size:17px; font-weight:700; }
      .tiny { fill:#6f89a9; font-size:12px; }
      .line { stroke:url(#edge); stroke-width:3; stroke-dasharray:10 12; animation: flow 2.2s linear infinite; }
      .pulse { animation: pulse 1.8s ease-in-out infinite; transform-box:fill-box; transform-origin:center; }
      .blink { animation: blink 1s steps(2,end) infinite; }
      .bar1 { animation: grow1 3.4s ease-in-out infinite; }
      .bar2 { animation: grow2 4.1s ease-in-out infinite; }
      .bar3 { animation: grow3 2.8s ease-in-out infinite; }
      @keyframes flow { to { stroke-dashoffset:-44; } }
      @keyframes pulse { 0%,100% { opacity:.45; transform:scale(.86); } 50% { opacity:1; transform:scale(1.13); } }
      @keyframes blink { 50% { opacity:0; } }
      @keyframes grow1 { 0%,100% { width:76px; } 50% { width:104px; } }
      @keyframes grow2 { 0%,100% { width:108px; } 50% { width:92px; } }
      @keyframes grow3 { 0%,100% { width:56px; } 50% { width:88px; } }
    </style>
  </defs>

  <rect x="4" y="4" width="1192" height="422" rx="24" fill="url(#bg)" stroke="#203758" stroke-width="2"/>
  <rect x="5" y="5" width="1190" height="420" rx="23" fill="url(#grid)" opacity=".55"/>

  <circle cx="34" cy="31" r="6" fill="#ff5f57"/>
  <circle cx="55" cy="31" r="6" fill="#febc2e"/>
  <circle cx="76" cy="31" r="6" fill="#28c840"/>
  <text x="103" y="37" class="mono label">parsa@control-plane:~$ ./start-operations</text>
  <rect x="1117" y="20" width="54" height="22" rx="11" fill="#0b3328" stroke="#00c853"/>
  <circle cx="1132" cy="31" r="5" fill="#00e676" class="pulse"/>
  <text x="1143" y="35" class="mono tiny" fill="#6dffb0">LIVE</text>

  <text x="60" y="102" class="mono" fill="#f0f7ff" font-size="42" font-weight="800" letter-spacing="2">PARSA KHEZLI</text>
  <text x="62" y="133" class="mono label">DEVOPS ENGINEER // PYTHON BACKGROUND // INFRASTRUCTURE OPERATOR</text>
  <text x="62" y="165" class="mono" fill="#00e5ff" font-size="16">CONTROL PLANE ONLINE</text>
  <rect x="273" y="151" width="11" height="18" fill="#00e5ff" class="blink"/>

  <text x="62" y="208" class="mono tiny">DELIVERY PIPELINE</text>

  <line x1="154" y1="260" x2="244" y2="260" class="line"/>
  <line x1="354" y1="260" x2="444" y2="260" class="line"/>
  <line x1="554" y1="260" x2="644" y2="260" class="line"/>
  <line x1="754" y1="260" x2="844" y2="260" class="line"/>

  <g>
    <rect x="54" y="225" width="100" height="70" rx="12" fill="#0e2239" stroke="#00e5ff"/>
    <text x="104" y="254" text-anchor="middle" class="mono stage">CODE</text>
    <text x="104" y="277" text-anchor="middle" class="mono tiny">git push</text>
  </g>
  <g>
    <rect x="244" y="225" width="110" height="70" rx="12" fill="#151f42" stroke="#517cff"/>
    <text x="299" y="254" text-anchor="middle" class="mono stage">BUILD</text>
    <text x="299" y="277" text-anchor="middle" class="mono tiny">container</text>
  </g>
  <g>
    <rect x="444" y="225" width="110" height="70" rx="12" fill="#211a43" stroke="#7c4dff"/>
    <text x="499" y="254" text-anchor="middle" class="mono stage">TEST</text>
    <text x="499" y="277" text-anchor="middle" class="mono tiny">quality gate</text>
  </g>
  <g>
    <rect x="644" y="225" width="110" height="70" rx="12" fill="#102b35" stroke="#00b8d9"/>
    <text x="699" y="254" text-anchor="middle" class="mono stage">DEPLOY</text>
    <text x="699" y="277" text-anchor="middle" class="mono tiny">staging/prod</text>
  </g>
  <g>
    <rect x="844" y="225" width="124" height="70" rx="12" fill="#0d3027" stroke="#00c853"/>
    <text x="906" y="254" text-anchor="middle" class="mono stage">OBSERVE</text>
    <text x="906" y="277" text-anchor="middle" class="mono tiny">metrics + logs</text>
  </g>

  <circle r="5" fill="#ffffff" filter="url(#glow)">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M154 260 H244"/>
  </circle>
  <circle r="5" fill="#ffffff" filter="url(#glow)">
    <animateMotion dur="2.2s" begin=".45s" repeatCount="indefinite" path="M354 260 H444"/>
  </circle>
  <circle r="5" fill="#ffffff" filter="url(#glow)">
    <animateMotion dur="2.2s" begin=".9s" repeatCount="indefinite" path="M554 260 H644"/>
  </circle>
  <circle r="5" fill="#ffffff" filter="url(#glow)">
    <animateMotion dur="2.2s" begin="1.35s" repeatCount="indefinite" path="M754 260 H844"/>
  </circle>

  <g transform="translate(1000,72)">
    <rect x="0" y="0" width="150" height="244" rx="16" fill="#0a1528" stroke="#263f64"/>
    <text x="18" y="29" class="mono label">TELEMETRY</text>
    <text x="18" y="63" class="mono tiny">CPU</text>
    <rect x="18" y="73" width="112" height="8" rx="4" fill="#182d49"/>
    <rect x="18" y="73" width="76" height="8" rx="4" fill="#00e5ff" class="bar1"/>
    <text x="18" y="108" class="mono tiny">MEMORY</text>
    <rect x="18" y="118" width="112" height="8" rx="4" fill="#182d49"/>
    <rect x="18" y="118" width="108" height="8" rx="4" fill="#7c4dff" class="bar2"/>
    <text x="18" y="153" class="mono tiny">LATENCY</text>
    <rect x="18" y="163" width="112" height="8" rx="4" fill="#182d49"/>
    <rect x="18" y="163" width="56" height="8" rx="4" fill="#00c853" class="bar3"/>
    <circle cx="27" cy="205" r="6" fill="#00e676" class="pulse"/>
    <text x="42" y="210" class="mono tiny" fill="#b8ffd4">SERVICES HEALTHY</text>
  </g>

  <g transform="translate(60,337)">
    <rect x="0" y="0" width="908" height="52" rx="12" fill="#081523" stroke="#1c3652"/>
    <text x="18" y="22" class="mono tiny">RUNTIME</text>
    <text x="18" y="40" class="mono" fill="#b6cce4" font-size="13">LINUX  ·  DOCKER  ·  NGINX  ·  CI/CD  ·  PROMETHEUS  ·  GRAFANA  ·  ANSIBLE</text>
    <circle cx="861" cy="26" r="6" fill="#00e5ff" class="pulse"/>
    <circle cx="882" cy="26" r="6" fill="#7c4dff" class="pulse" style="animation-delay:.4s"/>
  </g>
</svg>
